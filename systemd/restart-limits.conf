[Unit]
# Allow up to 10 restarts in 120s before systemd gives up.
StartLimitBurst=10
StartLimitIntervalSec=120

[Service]
# The daemon needs write access to:
#  - /etc/swanctl/conf.d/ for dynamic IKEv2 connection configs + secrets
#  - /etc/resolv.conf for DNS override on connect
#  - /proc/sys for ip rule / fwmark policy routing
ReadWritePaths=/etc/swanctl/conf.d /etc/resolv.conf /proc/sys
# Grant read access to the user's config (adjust path to match your username).
# For single-user systems the daemon resolves this via SUDO_USER or /home scan.
ReadOnlyPaths=/home

# The main unit sets NoNewPrivileges=true which blocks swanctl's agent
# plugin from acquiring CAP_SETUID/CAP_SETGID. Since the daemon already
# runs as root, this restriction adds no real security — override it.
NoNewPrivileges=false
